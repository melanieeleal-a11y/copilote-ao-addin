<script>
(function () {
  const data = JSON.parse(document.getElementById('payload').textContent);
  const fromB64 = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const KEY_STORE = 'cao_addin_cle';

  async function deriverCle(mdp) {
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(mdp), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: fromB64(data.salt), iterations: data.iterations, hash: 'SHA-256' },
      km, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
  }
  async function dechiffrer(key) {
    const clair = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: fromB64(data.iv) }, key, fromB64(data.ct));
    return new TextDecoder().decode(clair);
  }
  function lancer(html) {
    document.open();
    document.write(html);
    document.close();
  }
  async function essaiAuto() {
    const stocke = localStorage.getItem(KEY_STORE);
    if (!stocke) return;
    try {
      const key = await crypto.subtle.importKey('raw', fromB64(stocke), { name: 'AES-GCM' }, true, ['decrypt']);
      lancer(await dechiffrer(key));
    } catch { localStorage.removeItem(KEY_STORE); }
  }
  async function ouvrir() {
    const mdp = document.getElementById('mdp').value;
    if (!mdp) return;
    const btn = document.getElementById('ouvrir');
    btn.disabled = true;
    btn.textContent = 'Déverrouillage…';
    document.getElementById('err').textContent = '';
    try {
      const key = await deriverCle(mdp);
      const html = await dechiffrer(key);
      if (document.getElementById('souvenir').checked) {
        const brut = await crypto.subtle.exportKey('raw', key);
        localStorage.setItem(KEY_STORE, btoa(String.fromCharCode(...new Uint8Array(brut))));
      }
      lancer(html);
    } catch {
      btn.disabled = false;
      btn.textContent = 'Ouvrir';
      document.getElementById('err').textContent = 'Mot de passe incorrect.';
    }
  }
  document.getElementById('ouvrir').addEventListener('click', ouvrir);
  document.getElementById('mdp').addEventListener('keydown', (e) => { if (e.key === 'Enter') ouvrir(); });
  essaiAuto();
})();
</script>
